<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Pin infesté par les chenilles processionnaires avec nid soyeux et éco-piège">
  <defs>
    <linearGradient id="ciel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232019"/>
      <stop offset="1" stop-color="#12100c"/>
    </linearGradient>
    <radialGradient id="lune" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe07a"/>
      <stop offset="1" stop-color="#ffc400"/>
    </radialGradient>
    <pattern id="hz" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="34" height="34" fill="#12100c"/>
      <rect width="17" height="34" fill="#ffc400"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="800" height="600" fill="url(#ciel)"/>
  <circle cx="648" cy="132" r="46" fill="url(#lune)" opacity="0.92"/>

  <!-- Sol -->
  <path d="M0 486 Q 400 452 800 490 L800 600 L0 600 Z" fill="#1b1812"/>
  <path d="M0 486 Q 400 452 800 490" fill="none" stroke="#2c2820" stroke-width="3"/>

  <!-- Pin : tronc -->
  <path d="M300 486 L318 300 L342 300 L360 486 Z" fill="#3a2f22"/>
  <path d="M330 486 L330 306" stroke="#4a3d2c" stroke-width="4"/>

  <!-- Pin : houppier en strates -->
  <g fill="#33482f">
    <path d="M330 96  L232 236 L428 236 Z"/>
    <path d="M330 168 L212 316 L448 316 Z"/>
    <path d="M330 244 L196 392 L464 392 Z"/>
  </g>
  <g fill="#3f5838" opacity="0.9">
    <path d="M330 118 L262 236 L398 236 Z"/>
    <path d="M330 196 L246 316 L414 316 Z"/>
    <path d="M330 276 L232 392 L428 392 Z"/>
  </g>

  <!-- Nids soyeux blancs -->
  <g>
    <ellipse cx="288" cy="286" rx="34" ry="46" fill="#f4f1e8"/>
    <ellipse cx="288" cy="286" rx="34" ry="46" fill="none" stroke="#d9d3c4" stroke-width="2"/>
    <path d="M288 240 C 300 244 300 328 288 332" stroke="#e7e1d4" stroke-width="1.5" fill="none" opacity="0.7"/>
    <ellipse cx="392" cy="210" rx="24" ry="32" fill="#f4f1e8"/>
    <ellipse cx="392" cy="210" rx="24" ry="32" fill="none" stroke="#d9d3c4" stroke-width="2"/>
  </g>

  <!-- Éco-piège : collerette jaune + sac -->
  <path d="M300 366 Q330 352 360 366 L360 380 Q330 366 300 380 Z" fill="#ffc400"/>
  <path d="M306 380 Q330 372 354 380 L346 452 Q330 462 314 452 Z" fill="#efe9dc"/>
  <path d="M306 380 Q330 372 354 380 L346 452 Q330 462 314 452 Z" fill="none" stroke="#cfc7b4" stroke-width="2"/>

  <!-- Procession de chenilles au sol -->
  <g stroke="#12100c" stroke-width="1">
    <g fill="#c67b3e">
      <ellipse cx="470" cy="500" rx="9" ry="6"/>
      <ellipse cx="486" cy="502" rx="9" ry="6"/>
      <ellipse cx="502" cy="503" rx="9" ry="6"/>
      <ellipse cx="518" cy="503" rx="9" ry="6"/>
      <ellipse cx="534" cy="502" rx="9" ry="6"/>
    </g>
    <g fill="#a85f2a">
      <ellipse cx="556" cy="514" rx="9" ry="6"/>
      <ellipse cx="572" cy="516" rx="9" ry="6"/>
      <ellipse cx="588" cy="517" rx="9" ry="6"/>
      <ellipse cx="604" cy="516" rx="9" ry="6"/>
    </g>
  </g>

  <!-- Accent danger en bas -->
  <rect x="0" y="590" width="800" height="10" fill="url(#hz)"/>
</svg>
